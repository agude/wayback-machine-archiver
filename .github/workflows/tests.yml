name: Tests 🧪

on: [push, pull_request]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    name: Type Check 🔍
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 🐍
      uses: actions/setup-python@v4
      with:
        python-version: '3.14'

    - name: Set up uv 💨
      uses: astral-sh/setup-uv@v6
      with:
        version: latest

    - name: Install dependencies 🏗
      run: uv pip install --system -e ".[dev]" mypy types-requests

    - name: Run mypy 🔍
      run: mypy src/wayback_machine_archiver --strict

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
        - '3.10'
        - '3.11'
        - '3.12'
        - '3.13'
        - '3.14'
    name: Python ${{ matrix.python-version }} Test 🧪
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }} 🐍
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up uv 💨
      uses: astral-sh/setup-uv@v6
      with:
        version: latest

    - name: Install dependencies 🏗
      run: uv pip install --system -e ".[dev]"

    - name: Run Tests 🧪
      run: pytest -vv

    - name: Run Smoke Test ⚗️
      run: archiver --help
