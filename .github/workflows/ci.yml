name: CI 🧪

on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint 🧹
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Set up Python 🐍
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - name: Set up uv 💨
      uses: astral-sh/setup-uv@v8.0.0

    - name: Install dependencies 🏗
      run: uv pip install --system -e ".[dev]"

    - name: Run ruff check 🔎
      run: ruff check src/ tests/

    - name: Run ruff format check 🎨
      run: ruff format --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    name: Type Check 🔍
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Set up Python 🐍
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - name: Set up uv 💨
      uses: astral-sh/setup-uv@v8.0.0

    - name: Install dependencies 🏗
      run: uv pip install --system -e ".[dev]" mypy types-requests

    - name: Run mypy 🔍
      run: mypy src/wayback_machine_archiver --strict

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
        - '3.10'
        - '3.11'
        - '3.12'
        - '3.13'
        - '3.14'
    name: Python ${{ matrix.python-version }} Test 🧪
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Set up Python ${{ matrix.python-version }} 🐍
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up uv 💨
      uses: astral-sh/setup-uv@v8.0.0

    - name: Install dependencies 🏗
      run: uv pip install --system -e ".[dev]"

    - name: Run Tests 🧪
      run: pytest -vv

    - name: Run Smoke Test ⚗️
      run: archiver --help
